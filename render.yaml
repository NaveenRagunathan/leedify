services:
  - type: web
    runtime: node
    name: leadify
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: node .output/server/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SUPABASE_PROJECT_ID
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VITE_SUPABASE_PROJECT_ID
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: LINKEDIN_MCP_URL
        value: "http://linkedin-mcp:3100/mcp"
      - key: APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  # LinkedIn MCP server — runs Playwright for LinkedIn lead enrichment.
  # Requires Render Starter plan ($7/mo) or above (Docker not supported on Free).
  # The web service above will still work without this (Serper handles S1).
